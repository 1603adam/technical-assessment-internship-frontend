<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Assessment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-5">
        <h1 class="text-center">Welcome to the Frontend Assessment</h1>
        <!-- TODO: Implement Task 1 here -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href=""><b>Home</b></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href=""><b>About</b></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href=""><b>Browse</b></a>
                    </li>
                </ul>
            </div>
        </div>
        </nav>

        <div class="container mt-5">
        <!-- TODO: Implement Task 2 here -->
        <div class="row mt-4">
            <div class="col-md-4 mb-3">
                <div class="card">
                    <img src="image/Laptop.png" class="card-img-top" alt="Laptop">
                    <div class="card-body">
                        <h5 class="card-title">Laptop</h5>
                        <p class="card-text">Our Powerful Machine.</p>
                        <a href="" class="btn btn-dark">View Specs</a>
                    </div>
                </div>
            </div>

            <div class="col-md-4 mb-3">
                <div class="card">
                    <img src="image/Flip Phone.png" class="card-img-top" alt="Flip phone">
                    <div class="card-body">
                        <h5 class="card-title">Phone</h5>
                        <p class="card-text">Our Nostalgic Retro Flip Phone.</p>
                        <a href="" class="btn btn-dark">Back to the Past</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card">
                    <img src="image/Headphones.png" class="card-img-top" alt="Headphones">
                    <div class="card-body">
                        <h5 class="card-title">Headphones</h5>
                        <p class="card-text">Our Futuristic Hearables.</p>
                        <a href="" class="btn btn-dark">Check Details</a>
                    </div>
                </div>
            </div>
        </div>
        <!-- TODO: Implement Task 3 here -->
         <div class="mt-5">
            <h2>Contact Us</h2>
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="name" placeholder="Your Name">
                <label for="name">Name</label>
            </div>
            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="email" placeholder="Your Email">
                <label for="email">Email</label>
            </div>
            <div class="form-floating mb-3">
                <textarea class="form-control" id="message" placeholder="Your Message" style="height: 100px"></textarea>
                <label for="message">Message</label>
            </div>
            <button type="button" class="btn btn-dark" onclick="showModal()">Submit</button>
            </div>
        </div>
        <!-- Task 4: Modal -->
        <div class="modal fade" id="confirmModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Form Submission</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <p><strong>Name:</strong> <span id="modalName"></span></p>
                        <p><strong>Email:</strong> <span id="modalEmail"></span></p>
                        <p><strong>Message:</strong> <span id="modalMessage"></span></p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    </div>
                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            function showModal() {
                document.getElementById('modalName').textContent = document.getElementById('name').value;
                document.getElementById('modalEmail').textContent = document.getElementById('email').value;
                document.getElementById('modalMessage').textContent = document.getElementById('message').value;

                var modal = new bootstrap.Modal(document.getElementById('confirmModal'));
                modal.show();
            }
        </script>
</body>

</html>
